<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="icon" href="data:,">
    <title>Model Editor</title>
    <link rel="stylesheet" href="styles.css?v=20260715-60">
    <script defer src="https://unpkg.com/lucide@1.24.0/dist/umd/lucide.min.js"></script>
    <script defer src="editor.js?v=20260715-114"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
    <main x-data="pixelEditor" x-init="init()" @paste.window="handlePaste($event)" @keydown.window="handleKeydown($event)" @pointerdown.window="closeContextMenus($event)" x-cloak>
        <nav class="topbar tools" aria-label="Drawing tools">
                <div class="tool-group">
                    <button type="button" :class="{ active: tool === 'pencil' }" @click="tool = 'pencil'" title="Pencil" aria-label="Pencil">
                        <i data-lucide="pencil"></i>
                    </button>
                    <button type="button" :class="{ active: tool === 'eraser' }" @click="tool = 'eraser'" title="Eraser" aria-label="Eraser">
                        <i data-lucide="eraser"></i>
                    </button>
                    <button type="button" :class="{ active: tool === 'eyedropper' }" @click="tool = 'eyedropper'" title="Eyedropper" aria-label="Eyedropper">
                        <i data-lucide="pipette"></i>
                    </button>
                    <button type="button" :class="{ active: tool === 'bucket' }" @click="tool = 'bucket'" title="Paint Bucket" aria-label="Paint Bucket">
                        <i data-lucide="paint-bucket"></i>
                    </button>
                    <button type="button" :class="{ active: tool === 'selection' }" @click="tool = 'selection'" title="Rectangular selection" aria-label="Rectangular selection">
                        <i data-lucide="scan"></i>
                    </button>
                    <button type="button" :class="{ active: tool === 'wand' }" @click="tool = 'wand'" title="Magic Wand" aria-label="Magic Wand">
                        <i data-lucide="wand-sparkles"></i>
                    </button>
                    <button type="button" :class="{ active: tool === 'move' }" @click="tool = 'move'" title="Move selection" aria-label="Move selection">
                        <i data-lucide="move"></i>
                    </button>
                </div>

                <label class="brush-size" x-show="tool === 'pencil'">
                    <span>Size</span>
                    <input type="number" min="1" max="16" x-model.number="pencilSize" aria-label="Pencil size value">
                </label>

                <label class="brush-size" x-show="tool === 'eraser'">
                    <span>Size</span>
                    <input type="number" min="1" max="16" x-model.number="eraserSize" aria-label="Eraser size value">
                </label>

                <label class="wand-tolerance" x-show="tool === 'wand' || tool === 'bucket'">
                    <span>Tolerance</span>
                    <input type="number" min="0" max="255" x-model.number="wandTolerance" aria-label="Magic Wand tolerance value">
                </label>

                <label class="color-control" title="Color">
                    <input type="color" x-model="color" aria-label="Drawing color">
                </label>
                <div class="topbar-swatches" aria-label="Active palette swatches">
                    <template x-for="swatch in activePaletteColors()" :key="swatch">
                        <button type="button" class="swatch" :class="{ selected: color === swatch }" :style="`--swatch: ${swatch}`" @click="highlightPaletteColor(swatch); color = swatch; tool = 'pencil'" @dblclick="togglePaletteColorSelection(swatch, $event.shiftKey)" :title="swatch" :aria-label="`Use ${swatch}`"></button>
                    </template>
                </div>

        </nav>

        <div class="editor-body">
            <section
                class="workspace"
                :class="{ 'drop-active': dropActive }"
                @dragenter.prevent="dropActive = true"
                @dragover.prevent="dropActive = true"
                @dragleave.self="dropActive = false"
                @drop.prevent="handleDrop($event)"
            >
                <div class="workspace-content">
                    <div class="canvas-controls">
                        <div class="orientation-tabs" role="tablist" aria-label="Model orientation">
                            <template x-for="orientation in orientations" :key="orientation.id">
                                <button
                                    type="button"
                                    role="tab"
                                    :class="{ active: activeOrientation === orientation.id }"
                                    :aria-selected="activeOrientation === orientation.id"
                                    @click="switchOrientation(orientation.id)"
                                    x-text="orientation.label"
                                ></button>
                            </template>
                        </div>
                        <div class="canvas-actions">
                            <button type="button" @click="undo()" :disabled="history.length === 0" title="Undo" aria-label="Undo">
                                <i data-lucide="undo-2"></i>
                            </button>
                            <button type="button" @click="redo()" :disabled="future.length === 0" title="Redo" aria-label="Redo">
                                <i data-lucide="redo-2"></i>
                            </button>
                            <button type="button" :class="{ active: gridVisible }" @click="gridVisible = !gridVisible" title="Toggle grid" aria-label="Toggle grid">
                                <i data-lucide="grid-3x3"></i>
                            </button>
                            <button type="button" :class="{ active: verticalSymmetry }" @click="verticalSymmetry = !verticalSymmetry; renderVoxelCursor()" title="Vertical symmetry" aria-label="Toggle vertical symmetry">
                                <i data-lucide="flip-horizontal-2"></i>
                            </button>
                            <button type="button" :class="{ active: horizontalSymmetry }" @click="horizontalSymmetry = !horizontalSymmetry; renderVoxelCursor()" title="Horizontal symmetry" aria-label="Toggle horizontal symmetry">
                                <i data-lucide="flip-vertical-2"></i>
                            </button>
                            <button type="button" @click="download()" title="Export PNG" aria-label="Export PNG">
                                <i data-lucide="download"></i>
                            </button>
                        </div>
                    </div>
                    <div class="canvas-frame" @contextmenu="openCanvasMenu($event)">
                        <canvas
                            x-ref="canvas"
                            width="64"
                            height="64"
                            :class="`tool-${tool}`"
                            @pointerdown="startPointer($event)"
                            @pointermove="continuePointer($event)"
                            @pointerup.window="endPointer($event)"
                            @pointercancel.window="endPointer($event)"
                            @pointerleave="clearHover()"
                            @mousedown.middle.prevent
                            @auxclick.prevent
                            aria-label="64 by 64 pixel drawing canvas"
                        ></canvas>
                        <canvas x-ref="voxelCanvas" class="voxel-canvas" aria-hidden="true"></canvas>
                        <canvas x-ref="horizontalRuler" class="canvas-ruler ruler-horizontal" aria-hidden="true"></canvas>
                        <canvas x-ref="verticalRuler" class="canvas-ruler ruler-vertical" aria-hidden="true"></canvas>
                        <div class="ruler-corner" aria-hidden="true"></div>
                        <canvas x-ref="paletteHighlight" class="palette-highlight" width="64" height="64" x-show="!voxelReady" aria-hidden="true"></canvas>
                        <div class="pixel-grid" x-show="gridVisible && !voxelReady" aria-hidden="true"></div>
                        <div class="center-guide center-guide-x" x-show="centerGuideX || verticalSymmetry" aria-hidden="true"></div>
                        <div class="center-guide center-guide-y" x-show="centerGuideY || horizontalSymmetry" aria-hidden="true"></div>
                        <svg class="selection-outline" x-show="selection && !voxelReady" viewBox="0 0 64 64" preserveAspectRatio="none" aria-hidden="true">
                            <path :d="selectionPath"></path>
                            <path class="marching" :d="selectionPath"></path>
                        </svg>
                        <div
                            class="selection-hitbox"
                            x-show="tool === 'move' && selection && !voxelReady"
                            :style="selectionStyle()"
                            @pointerdown.stop="startMove($event)"
                            @pointermove="continuePointer($event)"
                            @pointerleave="clearHover()"
                            aria-hidden="true"
                        ></div>
                        <div class="pixel-cursor" x-show="hoverPoint && !voxelReady" :style="hoverStyle()" aria-hidden="true"></div>
                        <div class="canvas-context-menu" x-show="canvasMenu" :style="canvasMenu ? { left: `${canvasMenu.x}px`, top: `${canvasMenu.y}px` } : {}" @pointerdown.stop>
                            <button type="button" :disabled="!selection" @click="flipSelection('horizontal')">
                                <i data-lucide="flip-horizontal-2"></i>
                                <span>Flip horizontally</span>
                            </button>
                            <button type="button" :disabled="!selection" @click="flipSelection('vertical')">
                                <i data-lucide="flip-vertical-2"></i>
                                <span>Flip vertically</span>
                            </button>
                        </div>
                    </div>
                    <div class="canvas-zoom">
                        <output x-text="`${voxelZoom.toFixed(1)}x`" aria-label="Canvas zoom"></output>
                    </div>
                    <div class="preview-presets" role="group" aria-label="Preview controls">
                            <button type="button" class="preview-origin" @click="resetPreviewPosition()" title="Return to origin" aria-label="Return preview to origin">
                                <i data-lucide="crosshair"></i>
                            </button>
                            <button type="button" :class="{ active: previewPreset === 'perspective' }" @click="setPreviewView('perspective')" title="Perspective view" aria-label="Perspective view">
                                <i data-lucide="box"></i>
                            </button>
                            <button type="button" :class="{ active: previewPreset === 'front' }" @click="setPreviewView('front')" title="Front view" aria-label="Front view">
                                <i data-lucide="square"></i>
                            </button>
                            <button type="button" :class="{ active: previewPreset === 'back' }" @click="setPreviewView('back')" title="Back view" aria-label="Back view">
                                <i data-lucide="square-dashed"></i>
                            </button>
                            <button type="button" :class="{ active: previewPreset === 'right' }" @click="setPreviewView('right')" title="Right view" aria-label="Right view">
                                <i data-lucide="panel-right"></i>
                            </button>
                            <button type="button" :class="{ active: previewPreset === 'left' }" @click="setPreviewView('left')" title="Left view" aria-label="Left view">
                                <i data-lucide="panel-left"></i>
                            </button>
                            <button type="button" :class="{ active: previewPreset === 'top' }" @click="setPreviewView('top')" title="Top view" aria-label="Top view">
                                <i data-lucide="panel-top"></i>
                            </button>
                            <button type="button" :class="{ active: previewPreset === 'bottom' }" @click="setPreviewView('bottom')" title="Bottom view" aria-label="Bottom view">
                                <i data-lucide="panel-bottom"></i>
                            </button>
                    </div>
                    <div class="future-window">
                            <canvas
                                x-ref="previewCanvas"
                                class="model-preview"
                                @pointerdown="startPreviewDrag($event)"
                                @pointermove="continuePreviewDrag($event)"
                                @pointerup.window="endPreviewDrag($event)"
                                @pointercancel.window="endPreviewDrag($event)"
                                @mousedown.middle.prevent
                                @auxclick.prevent
                                @contextmenu.prevent
                                aria-label="Pannable, rotatable, and zoomable model preview"
                            ></canvas>
                    </div>
                </div>
                <div class="drop-indicator" x-show="dropActive" aria-hidden="true">
                    <i data-lucide="image-down"></i>
                </div>
            </section>

            <aside class="layers-panel">
                <section class="layers-section">
                    <header class="model-editor-header">
                        <h1>Model Editor</h1>
                        <div class="model-file-actions">
                            <button type="button" @click="saveProject()" title="Save model project" aria-label="Save model project">
                                <i data-lucide="save"></i>
                            </button>
                            <button type="button" @click="$refs.projectInput.click()" title="Load model project" aria-label="Load model project">
                                <i data-lucide="folder-open"></i>
                            </button>
                            <input x-ref="projectInput" class="file-input" type="file" accept=".grindland,application/json" @change="loadProject($event.target.files[0]); $event.target.value = ''">
                        </div>
                    </header>
                    <header class="layers-header">
                        <div class="layer-actions">
                            <button type="button" @click="$refs.fileInput.click()" title="Open image" aria-label="Open image">
                                <i data-lucide="image-plus"></i>
                            </button>
                            <input x-ref="fileInput" class="file-input" type="file" accept="image/*" multiple @change="importFiles($event.target.files); $event.target.value = ''">
                            <button type="button" @click="addLayer()" title="New layer" aria-label="New layer">
                                <i data-lucide="sticky-note-plus"></i>
                            </button>
                            <button type="button" @click="createGroup()" title="New group" aria-label="New layer group">
                                <i data-lucide="folder-plus"></i>
                            </button>
                            <button type="button" @click="duplicateLayer()" :disabled="!activeLayerId" title="Duplicate layer" aria-label="Duplicate layer">
                                <i data-lucide="copy"></i>
                            </button>
                            <button type="button" @click="removeLayerOrGroup()" :disabled="!activeGroupId && !activeLayerId" title="Delete layer or group" aria-label="Delete layer or group">
                                <i data-lucide="trash-2"></i>
                            </button>
                        </div>
                    </header>

                    <div class="layers-list" @dragover.prevent="setLayerInterior($event)" @drop.prevent="finishLayerDrag()">
                        <div class="layer-root-drop layer-root-drop-top" :class="{ active: layerDropTarget === 'root:top' }" x-show="draggedLayerWasGrouped" @dragover.prevent.stop="setRootDrop('top', $event)" @drop.prevent.stop="commitLayerDrop()"></div>
                        <template x-for="entry in layerEntries()" :key="entry.key">
                            <div
                                class="layer-list-entry"
                                :data-layer-entry="entry.key"
                                :class="{
                                    'group-member-entry': entry.type === 'layer' && entry.grouped,
                                    'last-group-member': entry.lastInGroup,
                                    'drop-before': isLayerDropMarker(entry.key, 'before'),
                                    'drop-after': isLayerDropMarker(entry.key, 'after'),
                                    'drop-grouped': isLayerDropMarkerGrouped(entry.key)
                                }"
                                @dragover.prevent.stop="setEntryGapDrop(entry.type, entry.type === 'group' ? entry.group.id : entry.layer.id, $event)"
                                @drop.prevent.stop="commitLayerDrop()"
                            >
                                <template x-if="entry.type === 'group'">
                                    <div
                                        class="layer-group-row"
                                        :class="{
                                            active: activeGroupId === entry.group.id,
                                            'drop-inside': layerDropTarget === `group:${entry.group.id}` && layerDropPosition === 'inside'
                                        }"
                                        :draggable="editingGroupId !== entry.group.id"
                                        @click="activateGroup(entry.group.id)"
                                        @dragstart="beginGroupDrag(entry.group.id, $event)"
                                        @dragover.prevent.stop="setGroupDrop(entry.group.id, $event)"
                                        @drop.prevent.stop="commitLayerDrop()"
                                        @dragend="finishLayerDrag()"
                                    >
                                        <button type="button" class="visibility group-visibility" :class="{ muted: !groupVisible(entry.group), partial: groupPartiallyVisible(entry.group) }" :disabled="groupLayerCount(entry.group.id) === 0" @click.stop="toggleGroupVisibility(entry.group)" title="Toggle group visibility" aria-label="Toggle group visibility">
                                            <i data-lucide="eye"></i>
                                        </button>
                                        <button type="button" class="group-toggle" :class="{ expanded: !entry.group.collapsed }" @click.stop="toggleGroup(entry.group)" :title="entry.group.collapsed ? 'Expand group' : 'Collapse group'" :aria-label="entry.group.collapsed ? 'Expand group' : 'Collapse group'" :aria-expanded="!entry.group.collapsed">
                                            <i data-lucide="chevron-right"></i>
                                        </button>
                                        <i class="group-icon" data-lucide="folder" aria-hidden="true"></i>
                                        <input
                                            class="layer-name group-name"
                                            x-model="entry.group.name"
                                            :readonly="editingGroupId !== entry.group.id"
                                            :draggable="editingGroupId !== entry.group.id"
                                            @pointerdown="activateGroup(entry.group.id)"
                                            @dblclick.stop="editingGroupId = entry.group.id; $nextTick(() => { $event.target.readOnly = false; $event.target.select(); })"
                                            @blur="editingGroupId = null"
                                            @keydown.enter="$event.target.blur()"
                                            aria-label="Group name"
                                            title="Drag group or double-click to rename"
                                        >
                                    </div>
                                </template>
                                <template x-if="entry.type === 'layer'">
                                    <div
                                        class="layer-row"
                                        :class="{
                                            active: activeLayerId === entry.layer.id,
                                            selected: isLayerSelected(entry.layer.id),
                                            grouped: entry.grouped
                                        }"
                                        :draggable="editingLayerId !== entry.layer.id"
                                        @click="selectLayer(entry.layer.id, $event)"
                                        @contextmenu="openLayerMenu(entry.layer.id, $event)"
                                        @dblclick="selectLayerPixels(entry.layer.id)"
                                        @dragstart="beginLayerDrag(entry.layer.id, $event)"
                                        @dragover.prevent.stop="setEntryGapDrop('layer', entry.layer.id, $event)"
                                        @drop.stop.prevent="commitLayerDrop()"
                                        @dragend="finishLayerDrag()"
                                    >
                                        <button type="button" class="visibility" :class="{ muted: !entry.layer.visible }" @click.stop="toggleLayer(entry.layer)" title="Toggle visibility" aria-label="Toggle layer visibility">
                                            <i data-lucide="eye"></i>
                                        </button>
                                        <span class="layer-thumbnail">
                                            <canvas width="64" height="64" :data-layer-thumbnail="entry.layer.id"></canvas>
                                        </span>
                                        <input
                                            class="layer-name"
                                            x-model="entry.layer.name"
                                            draggable="false"
                                            @pointerdown.stop="selectLayer(entry.layer.id, $event); editingLayerId = entry.layer.id"
                                            @click.stop
                                            @focus="editingLayerId = entry.layer.id"
                                            @blur="editingLayerId = null"
                                            @dblclick.stop
                                            @dragstart.stop.prevent
                                            aria-label="Layer name"
                                        >
                                        <div class="layer-depth-control">
                                            <label class="layer-value-control" title="Voxel depth">
                                                <i data-lucide="box" aria-hidden="true"></i>
                                                <input
                                                    class="layer-depth"
                                                    type="number"
                                                    :min="layerDepthMin(entry.layer)"
                                                    :max="layerDepthMax(entry.layer)"
                                                    step="1"
                                                    :value="entry.layer.depth"
                                                    draggable="false"
                                                    @input="setLayerDepth(entry.layer, $event.target)"
                                                    @pointerdown.stop="beginLayerValueEdit(entry.layer, 'depth')"
                                                    @focus="beginLayerValueEdit(entry.layer, 'depth')"
                                                    @blur="endLayerValueEdit()"
                                                    @dblclick.stop
                                                    @dragstart.stop.prevent
                                                    aria-label="Voxel depth"
                                                >
                                            </label>
                                            <label class="layer-value-control" :title="`Depth offset: ${entry.layer.offset}`">
                                                <i data-lucide="move-horizontal" aria-hidden="true"></i>
                                                <input
                                                    class="layer-offset"
                                                    type="number"
                                                    :min="layerOffsetMin(entry.layer)"
                                                    :max="layerOffsetMax(entry.layer)"
                                                    step="1"
                                                    :value="entry.layer.offset"
                                                    draggable="false"
                                                    @input="setLayerOffset(entry.layer, $event.target)"
                                                    @pointerdown.stop="beginLayerValueEdit(entry.layer, 'offset')"
                                                    @focus="beginLayerValueEdit(entry.layer, 'offset')"
                                                    @blur="endLayerValueEdit()"
                                                    @dblclick.stop
                                                    @dragstart.stop.prevent
                                                    aria-label="Layer depth offset"
                                                >
                                            </label>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                        <div class="layer-root-drop layer-root-drop-bottom" :class="{ active: layerDropTarget === 'root:bottom' }" x-show="draggedLayerWasGrouped" @dragover.prevent.stop="setRootDrop('bottom', $event)" @drop.prevent.stop="commitLayerDrop()"></div>
                    </div>
                </section>

                <section class="palette-panel">
                    <div class="palette-content">
                        <div class="palette-control">
                            <div class="quantization">
                                <span>Color Quantizer</span>
                                <input
                                    type="range"
                                    min="1"
                                    :max="quantizationMax"
                                    :value="quantization"
                                    :disabled="!activeLayerId"
                                    @pointerdown="beginQuantization()"
                                    @input="quantizeActiveLayer($event.target.value)"
                                    aria-label="Color Quantizer"
                                >
                                <output x-text="quantization"></output>
                                <button
                                    type="button"
                                    class="quantization-confirm"
                                    :disabled="!quantizationPending"
                                    @click="confirmQuantization()"
                                    title="Apply quantization"
                                    aria-label="Apply quantization"
                                >
                                    <i data-lucide="check"></i>
                                </button>
                            </div>
                            <section class="palette-entry">
                                <header class="palette-entry-header">
                                    <select :value="activePaletteId" @change="selectPalette($event.target.value)" aria-label="Active color palette">
                                        <option value="default">Default</option>
                                        <template x-for="entry in importedPalettes" :key="entry.id">
                                            <option :value="entry.id" x-text="entry.name"></option>
                                        </template>
                                    </select>
                                    <button type="button" @click="$refs.paletteInput.click()" title="Import GPL palette" aria-label="Import GPL palette">
                                        <i data-lucide="palette"></i>
                                    </button>
                                    <input x-ref="paletteInput" class="file-input" type="file" accept=".gpl,text/plain" @change="importPaletteFile($event.target.files[0]); $event.target.value = ''">
                                    <span x-text="`${activePaletteColors().length} colors`"></span>
                                </header>
                            </section>
                        </div>
                    </div>
                </section>
            </aside>
        </div>
        <div class="layer-context-menu" x-show="layerMenu" :style="layerMenu ? { left: `${layerMenu.x}px`, top: `${layerMenu.y}px` } : {}" @pointerdown.stop>
            <button type="button" @click="mergeSelectedLayers()">
                <i data-lucide="layers-2"></i>
                <span>Merge layers</span>
            </button>
        </div>
    </main>
</body>
</html>
